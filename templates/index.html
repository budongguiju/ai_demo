{% extends "layout.html" %}

{% block title %}学生列表{% endblock %}

{% block content %}
<h2>学生列表</h2>
<a href="/add" class="btn btn-success mb-3">添加新学生</a>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>姓名</th>
        <th>年龄</th>
        <th>性别</th>
        <th>操作</th>
    </tr>
    {% for s in students %}
    <tr>
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.age }}</td>
        <td>{{ s.gender }}</td>
        <td>
            <a href="/edit/{{ s.id }}" class="btn btn-sm btn-warning">编辑</a>
            <a href="/delete/{{ s.id }}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')">删除</a>
        </td>
    </tr>
    {% else %}
    <tr>
        <td colspan="5" class="text-center">暂无学生</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
