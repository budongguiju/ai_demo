{% extends "layout.html" %}

{% block title %}编辑学生{% endblock %}

{% block content %}
<h2>编辑学生</h2>
<form method="post">
    <div class="mb-3">
        <label>姓名</label>
        <input type="text" name="name" value="{{ student.name }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>年龄</label>
        <input type="number" name="age" value="{{ student.age }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>性别</label>
        <input type="text" name="gender" value="{{ student.gender }}" class="form-control">
    </div>
    <button type="submit" class="btn btn-warning">更新</button>
</form>
{% endblock %}
